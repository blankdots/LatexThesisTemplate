name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build and release PDF
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Set up Git repository
        uses: actions/checkout@v6
      - name: Convert EPS figures to PDF
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y texlive-font-utils
          for f in figures/*.eps; do [ -f "$f" ] && epstopdf "$f"; done
      - name: Compile LaTeX document
        uses: xu-cheng/latex-action@v4
        with:
          root_file: main.tex
      - uses: actions/upload-artifact@v7
        with:
          name: PDF
          path: main.pdf
      - name: Copy PDF for release asset name
        run: cp main.pdf thesis-main.pdf
      - name: Create release and upload PDF
        uses: softprops/action-gh-release@v2
        with:
          files: thesis-main.pdf
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
